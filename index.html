<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Obsidian</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #eee;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .card {
            max-width: 480px;
            padding: 32px;
            background: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        h1 { font-size: 22px; margin: 0 0 12px; }
        p { color: #aaa; font-size: 14px; margin: 8px 0; }
        .file { font-family: monospace; background: #1a1a1a; padding: 8px 12px; border-radius: 6px; display: inline-block; word-break: break-all; font-size: 13px; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #7c5cff; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 500; }
        .btn:hover { background: #6a4de5; }
        .spinner { margin: 20px auto; width: 28px; height: 28px; border: 3px solid #444; border-top-color: #7c5cff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <h1>📝 Открываю заметку в Obsidian…</h1>
    <div class="spinner"></div>
    <p class="file" id="file-path">—</p>
    <p>Если ничего не произошло — нажми кнопку:</p>
    <a class="btn" id="open-btn" href="#">Открыть в Obsidian</a>
    <p style="margin-top: 24px; font-size: 12px;">На iPhone нужен <a style="color: #7c5cff;" href="https://obsidian.md/download">Obsidian</a> с настроенной синхронизацией vault'а <code>second-brain</code>.</p>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file') || '';
    const vault = params.get('vault') || 'second-brain';
    const target = `obsidian://open?vault=${encodeURIComponent(vault)}&file=${encodeURIComponent(file)}`;

    document.getElementById('file-path').textContent = file || '(файл не указан)';
    document.getElementById('open-btn').href = target;

    if (file) {
        // Redirect immediately
        window.location.replace(target);
    }
</script>
</body>
</html>
